name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev xvfb

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DBUILD_TESTING=ON

      - name: Configure Unix
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

      - name: Report native transport diagnostics
        if: runner.os == 'Windows' && failure()
        shell: pwsh
        run: |
          $log = "build/Testing/Temporary/LastTest.log"
          if (Test-Path $log) {
            "### Native transport diagnostics" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
            Get-Content $log | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload native transport diagnostics
        if: runner.os == 'Windows' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-transport-diagnostics
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: warn

      - name: Verify native transport coverage
        if: runner.os == 'macOS' || runner.os == 'Windows'
        run: >-
          ctest --test-dir build --build-config Debug
          --output-on-failure
          -R "transport_smoke|transport_lifecycle"

  linux-sanitizers:
    name: ubuntu-latest / sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev xvfb

      - name: Configure
        run: >-
          cmake -S . -B build-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DSAKURA_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-sanitize --config Debug --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build-sanitize --build-config Debug --output-on-failure
