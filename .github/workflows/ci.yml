name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev xvfb

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-sanitizers:
    name: ubuntu-latest / sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev xvfb

      - name: Configure
        run: >-
          cmake -S . -B build-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DSAKURA_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-sanitize --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build-sanitize --output-on-failure
